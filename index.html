<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kredi Hesaplama - Kredihesap.net</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  text-align: center;
  padding: 20px;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 10px;
  max-width: 400px;
  margin: auto;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px;
}

button {
  padding: 10px 20px;
  background: green;
  color: white;
  border: none;
}

.result {
  margin-top: 15px;
  font-weight: bold;
}
</style>

</head>

<body>

<h1>Kredi Hesaplama</h1>

<div class="container">

<input type="number" id="amount" placeholder="Kredi Tutarı (TL)">
<input type="number" id="rate" placeholder="Faiz (%)">
<input type="number" id="months" placeholder="Vade (Ay)">

<button onclick="calculate()">Hesapla</button>

<div class="result" id="result"></div>

</div>

<script>
function calculate() {
  let amount = document.getElementById("amount").value;
  let rate = document.getElementById("rate").value / 100 / 12;
  let months = document.getElementById("months").value;

  let payment = amount * rate / (1 - Math.pow(1 + rate, -months));
  document.getElementById("result").innerText =
    "Aylık Ödeme: " + payment.toFixed(2) + " TL";
}
</script>

</body>
</html>
